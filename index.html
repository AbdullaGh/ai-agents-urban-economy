  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

m;\n    box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 30px 80px -20px rgba(0,0,0,.18);\n    position: relative;\n    counter-reset: section;\n  }\n\n  .head{\n    text-align: center;\n    margin: 0 0 10mm;\n    padding: 12mm 0 8mm;\n    background: linear-gradient(to bottom, var(--tint) 0%, var(--tint) 78%, transparent 100%);\n    margin-right: -24mm; margin-left: -24mm;\n    padding-right: 24mm; padding-left: 24mm;\n    position: relative;\n  }\n  .head::after{ content: \"\"; position: absolute; left: 50%; bottom: 6mm; transform: translateX(-50%); width: 36px; height: 2px; background: var(--accent); }\n  .kicker{ font-family:'Inter', sans-serif; font-size: 8.5pt; letter-spacing: .32em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; direction: ltr; font-weight: 600; }\n  .kicker .ar{ font-family:'Noto Naskh Arabic', serif; letter-spacing: 0; font-weight: 500; color: var(--ink-2); margin: 0 8px; }\n  h1.title{ font-weight: 700; font-size: 26pt; line-height: 1.4; margin: 0 auto 14px; text-wrap: balance; max-width: 28em; }\n  h1.title .accent{ color: var(--accent); }\n  .authors{ display:flex; flex-direction: column; align-items:center; gap: 12px; margin: 22px 0 14px; }\n  .author{ display:flex; align-items:center; gap: 14px; }\n  .avatar{ width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--wash); border: 1px solid var(--rule); flex-shrink: 0; }\n  .author .who{ text-align: start; }\n  .author .name{ font-weight: 700; font-size: 12pt; line-height: 1.3; }\n  .author .affil{ font-size: 10pt; color: var(--ink-3); line-height: 1.4; margin-top: 2px; }\n  .author .corr{ font-family:'Inter', sans-serif; font-size: 8.5pt; color: var(--ink-3); direction: ltr; margin-top: 2px; }\n\n  /* — ABSTRACT block: brief journal-style abstract framing — */\n  .abstract{\n    margin: 0 0 12mm;\n    padding: 14px 18px;\n    border-top: 1px solid var(--rule);\n    border-bottom: 1px solid var(--rule);\n    background: #fbfaf6;\n  }\n  .abstract .lbl{\n    font-family: 'Inter', sans-serif;\n    font-size: 7.5pt;\n    letter-spacing: .26em;\n    text-transform: uppercase;\n    color: var(--accent);\n    font-weight: 600;\n    margin: 0 0 6px;\n    direction: ltr;\n  }\n  .abstract p{\n    margin: 0;\n    font-size: 10pt;\n    line-height: 1.75;\n    color: var(--ink-2);\n    text-align: justify;\n    text-wrap: pretty;\n  }\n  .abstract p + p{ margin-top: 4px; }\n\n  article{ margin: 0; }\n\n  /* — SECTION OPENER: big numeral + title + dek — */\n  .opener{\n    counter-increment: section;\n    display: grid;\n    grid-template-columns: 60px 1fr;\n    gap: 14px 18px;\n    align-items: start;\n    margin: 30px 0 14px;\n    padding-top: 18px;\n    border-top: 1px solid var(--rule-2);\n    page-break-after: avoid;\n    break-after: avoid;\n  }\n  .opener:first-of-type{\n    margin-top: 0;\n    border-top: 0;\n    padding-top: 0;\n  }\n  .opener .num-big{\n    font-family: 'Inter', sans-serif;\n    font-feature-settings: \"tnum\";\n    font-weight: 600;\n    font-size: 34pt;\n    line-height: .9;\n    color: var(--accent);\n    letter-spacing: -.02em;\n    direction: ltr;\n    text-align: center;\n    border-left: 1px solid var(--rule);\n    padding-left: 14px;\n    grid-row: 1 / 3;\n    align-self: stretch;\n    display: flex;\n    align-items: flex-start;\n    justify-content: center;\n    padding-top: 2px;\n  }\n  .opener h2{\n    font-weight: 700;\n    font-size: 14pt;\n    line-height: 1.35;\n    margin: 0;\n    color: var(--ink);\n    grid-column: 2;\n  }\n  .opener .dek{\n    grid-column: 2;\n    margin: 0;\n    font-size: 10pt;\n    line-height: 1.65;\n    color: var(--ink-3);\n    font-weight: 500;\n    font-style: italic;\n    text-wrap: balance;\n  }\n  .opener .dek::before{\n    content: \"—\";\n    color: var(--accent);\n    margin-left: 6px;\n    font-style: normal;\n    font-weight: 600;\n  }\n\n  article p{\n    margin: 0 0 1.05em;\n    text-align: justify;\n    text-justify: inter-word;\n    hyphens: auto;\n    text-wrap: pretty;\n  }\n  article p + p{ text-indent: 1.6em; }\n\n  .em{ font-weight: 600; color: var(--ink); }\n  .term-en{ font-family:'Inter', sans-serif; font-size: .92em; color: var(--ink-2); direction: ltr; unicode-bidi: isolate; font-weight: 500; }\n  .num{ font-family:'Inter', sans-serif; font-feature-settings: \"tnum\"; font-weight: 500; font-size: .94em; }\n\n  .pullquote{\n    margin: 22px 0;\n    padding: 18px 22px;\n    font-weight: 500;\n    font-size: 14pt;\n    line-height: 1.75;\n    background: var(--tint);\n    border-right: 3px solid var(--accent);\n    text-wrap: balance;\n    position: relative;\n  }\n  .pullquote::before{\n    content: \"\\201D\"; position: absolute; top: -4px; right: 12px;\n    font-size: 36pt; line-height: 1; color: var(--accent); opacity: .35;\n  }\n\n  .endmatter{ margin-top: 12mm; padding-top: 8mm; border-top: 1px solid var(--rule); }\n  .endmatter h3{ font-family:'Inter', sans-serif; font-size: 8.5pt; letter-spacing: .26em; text-transform: uppercase; margin: 0 0 8px; font-weight: 600; direction: ltr; }\n  .endmatter .ref{ font-size: 9.5pt; line-height: 1.75; margin: 0 0 6px; padding-right: 26px; text-indent: -26px; color: var(--ink-2); }\n  .endmatter .ref .n{ display: inline-block; width: 22px; font-family:'Inter', sans-serif; font-feature-settings: \"tnum\"; font-weight: 500; color: var(--ink-3); margin-left: 4px; unicode-bidi: isolate; }\n\n  /* — pagination: each .sheet is its own A4 page — */\n  .sheet{ page-break-after: always; break-after: page; }\n  .sheet:last-of-type{ page-break-after: auto; break-after: auto; }\n\n  /* per-article counter so section numbers continue across pages */\n  body{ counter-reset: section; }\n  .sheet{ counter-reset: none; }\n  .opener{ counter-increment: section; }\n  /* big numeral derived from counter so adding/removing pages still numbers correctly */\n  .opener .num-big::before{\n    content: counter(section, decimal-leading-zero);\n  }\n  .opener .num-big{ font-size: 0; }              /* hide any literal text inside */\n  .opener .num-big::before{ font-size: 34pt; }   /* restore size on the counter */\n\n  /* floating Print/PDF action — hidden in print */\n  .print-btn{\n    position: fixed;\n    bottom: 22px; left: 22px;\n    z-index: 50;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 10px 16px 10px 14px;\n    background: var(--paper);\n    color: var(--ink);\n    border: 1px solid var(--rule);\n    border-radius: 999px;\n    font-family: 'Inter', sans-serif;\n    font-size: 9.5pt;\n    font-weight: 600;\n    letter-spacing: .04em;\n    cursor: pointer;\n    box-shadow: 0 10px 30px -12px rgba(0,0,0,.25);\n    transition: border-color .2s, color .2s, transform .15s;\n  }\n  .print-btn:hover{ border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }\n  .print-btn svg{ width: 14px; height: 14px; }\n\n  /* page-count chip on each sheet, visible on screen */\n  .sheet .page-num{\n    position: absolute;\n    bottom: 12mm;\n    left: 24mm;\n    font-family: 'Inter', sans-serif;\n    font-size: 8pt;\n    color: var(--ink-4);\n    letter-spacing: .12em;\n    direction: ltr;\n  }\n  .sheet .page-num b{ color: var(--ink-2); font-weight: 600; font-feature-settings: \"tnum\"; }\n\n  @media (max-width: 720px){\n    .sheet{ width: auto; padding: 18px 20px 60px; min-height: 0; margin: 0; box-shadow: none; }\n    .sheet + .sheet{ border-top: 1px solid var(--rule); }\n    .head{ margin: 0 -20px 18px; padding: 22px 20px 24px; }\n    h1.title{ font-size: 22pt; }\n    article p{ text-align: start; hyphens: manual; }\n    article p + p{ text-indent: 0; }\n    .opener{ grid-template-columns: 46px 1fr; gap: 8px 12px; }\n    .opener .num-big::before{ font-size: 26pt; }\n    .opener .num-big{ padding-left: 10px; }\n    .opener h2{ font-size: 13pt; }\n    .sheet .page-num{ display: none; }\n  }\n\n  @media print{\n    /* zero @page margins so each .sheet fully owns an A4 page — the sheet's own padding (14mm 24mm) provides the actual margins, and .head's negative margins can bleed safely */\n    @page{\n      size: A4 portrait;\n      margin: 0;\n    }\n    html, body{\n      background: #fff !important;\n      margin: 0 !important;\n      padding: 0 !important;\n    }\n    .sheet{\n      width: 210mm !important;\n      height: 297mm !important;\n      min-height: 297mm !important;\n      max-height: 297mm;\n      margin: 0 !important;\n      padding: 14mm 24mm 24mm !important;\n      box-shadow: none !important;\n      page-break-after: always;\n      break-after: page;\n      overflow: hidden;     /* belt-and-suspenders: anything that overflows the sheet does not push to a new browser-injected page */\n    }\n    .sheet:last-of-type{ page-break-after: auto; break-after: auto; }\n    .print-btn{ display: none !important; }\n    .sheet .page-num{\n      display: block;\n      color: var(--ink-3) !important;\n    }\n    h1.title, h2, .opener{ break-after: avoid; page-break-after: avoid; }\n    .opener, .pullquote, .abstract{ break-inside: avoid; page-break-inside: avoid; }\n    /* Density: print pages must fit a fixed A4 height — tighten leading + opener spacing so dense pages don't bleed into the page-num strip */\n    body{ line-height: 1.7; }\n    article p{ margin: 0 0 .8em; }\n    .opener{ margin: 18px 0 10px; padding-top: 12px; }\n    .opener:first-of-type{ margin-top: 0; }\n    .opener .num-big::before{ font-size: 30pt; }\n    .opener h2{ font-size: 13.5pt; line-height: 1.3; }\n    .opener .dek{ font-size: 9.5pt; line-height: 1.55; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<button class=\"print-btn\" onclick=\"window.print()\" aria-label=\"طباعة وحفظ PDF\">\n  <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><polyline points=\"6 9 6 2 18 2 18 9\"><\u002Fpolyline><path d=\"M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect><\u002Fsvg>\n  <span>طباعة / PDF<\u002Fspan>\n<\u002Fbutton>\n\n<main class=\"sheet\">\n  <span class=\"page-num\"><b>01<\u002Fb> / 04<\u002Fspan>\n\n  <header class=\"head\">\n    <div class=\"kicker ui\">\n      <span>Urban Economics<\u002Fspan>\n      <span class=\"ar\">· مقالة بحثيّة<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"title\">\n      الأرض تتبع الاقتصاد<span class=\"accent\">:<\u002Fspan> عدسة لقراءة مستقبل المدن في عصر الوكلاء الرقميين\n    <\u002Fh1>\n    <div class=\"authors\">\n      <div class=\"author\">\n        <img class=\"avatar\" src=\"b3f07922-546f-4451-88c0-2dddc2b4f6b0\" alt=\"صورة المؤلف\">\n        <div class=\"who\">\n          <div class=\"name\">د. عبدالله ضيف الله<\u002Fdiv>\n          <div class=\"affil\">باحث في التخطيط العمراني<\u002Fdiv>\n          <div class=\"corr ui\">adifalla@gmail.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- JOURNAL-STYLE ABSTRACT framing the whole article -->\n  <section class=\"abstract\" aria-label=\"ملخص\">\n    <div class=\"lbl ui\">Abstract · ملخّص<\u002Fdiv>\n    <p>تطرح هذه المقالة فرضية ذات شواهد قوية: قيمة الأرض تنساق خلف الاقتصاد المهيمن. لدعم هذه الفرضية, تستعرض ثلاث موجات تاريخية — زراعية، صناعية، حضرية — ثم ترصد، استناداً إلى بحث نشر في عام ٢٠٢٢ قام بمراجعة نتائج&nbsp;٣٠٠ ورقة علمية، تراجع إنتاجية التكتل الحضري بعد عام ٢٠١٠. وتقترح أن صعود الوكلاء الرقميين يُشكّل موجةً رابعة، تتجلى في تصدّر أراضي مراكز البيانات لهرم القيمة العقارية، مع إشارة إلى موقع المدن العربية — وفي مقدمتها الرياض — في هذا التحوّل.<\u002Fp>\n  <\u002Fsection>\n\n  <article>\n\n    <header class=\"opener\">\n      <div class=\"num-big\">01<\u002Fdiv>\n      <h2>مقدّمة&nbsp;<\u002Fh2>\n      <p class=\"dek\">ثلاث موجات اقتصادية تعاقبت على أوروبا منذ القرن السابع عشر، وقيمة الأرض كانت في كل مرة تتبع المحرّك الجديد.<\u002Fp>\n    <\u002Fheader>\n    <p>في القرن السابع عشر الميلادي، كانت قيمة الأراضي الزراعية في بريطانيا تتجاوز قيمة الناتج الوطني بسبعة أضعاف، وينطبق الأمر ذاته على أغلب الدول الأوروبية آنذاك. وفي القرن الثامن عشر، انخفض هذا المعدل ليصل إلى ثلاثة أو أربعة أضعاف. أما اليوم، فإن قيمة الأراضي الزراعية في هذه الدول قد لا تتجاوز ٣٪ من إجمالي الناتج الوطني. خسرت الأراضي الزراعية مكانتها كمحرّك رئيسي للاقتصاد، ليتصاعد وهج الثورة الصناعية، التي جعلت بدورها من الأراضي الصناعية الأغلى سعراً؛ نتيجة التنافس الإنتاجي بين المصانع، حتى وصلت قيمتها إلى أربعة أضعاف إجمالي الناتج الوطني في بعض الدول.<\u002Fp>\n    <p>\n      ثم برز تحوّل آخر أدى إلى تراجع الصناعة كمحرّك رئيسي للاقتصاد، ولكن هذه المرة لصالح <span class=\"em\">اقتصاد المعرفة والخدمات<\u002Fspan>، أو ما يُعرف بـ<span class=\"em\">الاقتصاد الحضري<\u002Fspan>. يرتكز هذا الاقتصاد بالدرجة الأولى على مقوّمَين أساسيين: <span class=\"em\">التكتل الجغرافي<\u002Fspan> <span class=\"term-en\">(Agglomeration)<\u002Fspan> و<span class=\"em\">الطبقة المبدعة<\u002Fspan> <span class=\"term-en\">(Creative Class)<\u002Fspan>. يتمثل الأول في ارتفاع الكثافة السكانية، وما يرافقها من كثافة في الشركات ومولّدات الوظائف والخدمات. أما الثاني، فيتمثل في تواجد الفرد المتخصص الذي يُنتج قيمة تفوق مرتّبه الشهري، ويستطيع — مع أقرانه — خلق معدل استهلاك عالٍ قادر على تحريك الاقتصادات المحلية. اليوم، تمثل قيمة الأراضي الحضرية أربعة إلى خمسة أضعاف إجمالي الناتج الوطني في أغلب مدننا المعاصرة، وهي الحقبة التي نعيشها حالياً.\n    <\u002Fp>\n\n  <\u002Farticle>\n<\u002Fmain>\n\n<main class=\"sheet\">\n  <span class=\"page-num\"><b>02<\u002Fb> / 04<\u002Fspan>\n  <article>\n\n    <header class=\"opener\">\n      <div class=\"num-big\"><\u002Fdiv>\n      <h2>الفرضية: قيمة الأرض تتبع الاقتصاد المهيمن<\u002Fh2>\n      <p class=\"dek\">الأرض لا تقود الاقتصاد، بل تنساق خلفه. هذه العدسة التحليلية التي تستخدمها المقالة لتحليل التغيرات الاقتصادية.<\u002Fp>\n    <\u002Fheader>\n    <p>الغرض من استعراض هذه التحولات التاريخية هو تعزيز فكرة جوهرية ثابتة: تنساق قيمة الأرض وراء المحرّك الاقتصادي المهيمن في المدينة. فحينما تحوّل مركز الإنتاج من المزرعة إلى المصنع، تهاوت قيمة الأراضي الزراعية وارتفعت نظيرتها الصناعية. وحينما اتجه الاقتصاد نحو النمط الحضري، تراجعت قيمة الأراضي الصناعية لترتفع قيمة الأراضي الحضرية.<\u002Fp>\n    <p>لو تفحّصنا مكامن القوة التي جعلت من الاقتصاد الحضري مهيمناً في مدننا اليوم، لوجدنا أن العامل الأهم هو التكتل. فهو يسمح بتقليل تكاليف النقل، وتعظيم كفاءة استخدام الأرض، والأهم من ذلك: تعزيز التواصل البشري المباشر لإنجاز المهام، وتسهيل نقل المعرفة لتحسين المخرجات وتراكم الخبرات. هذه النقطة الأخيرة هي الركيزة التي يقوم عليها منطق القيمة الحضرية برمّته؛ فالإنتاج يعتمد على المعرفة، والمعرفة تنضج وتتطور باجتماع أشخاص ذوي خبرات وعلوم متنوعة. فكل فرد يمتلك معرفة غير مكتملة تتعاظم قيمتها بالاحتكاك بمعارف الآخرين.وجود الفرد المبدع ضمن هذا الحيّز الجغرافي وداخل هذا التداول المعرفي المتشابك هو ما يخلق القيمة المضافة للاقتصاد الحضري.<\u002Fp>\n\n    <p>\n      إلا أن هذا التكتل الذي يرتكز عليه الاقتصاد الحضري — ورغم كونه يُحدث أثراً إيجابياً في الإنتاجية يتراوح بين <span class=\"num\">٢٪<\u002Fspan> إلى <span class=\"num\">٦٪<\u002Fspan> — يجب ألا يجعلنا نركن إلى معطيات الحاضر، نظراً لوتيرة التغيير المتسارعة في الاقتصادات المهيمنة. فلو عدنا بالزمن، لأدركنا مآلات المدن الصناعية التي لم تستشرف التحوّل الاقتصادي اللاحق، وظلّت حبيسة اعتمادها على الصناعة، لتعاني اليوم تبعات هذا الخطأ الاستراتيجي الفادح. وحتى لا تقع مدننا في الفخ ذاته، يتحتم علينا قراءة مسار الاقتصاد الحضري عبر العقود لتقييم ما إذا كانت إنتاجيته في نموّ مستمر أم في انحدار. وإذا تبيّن أنها تتناقص، فهذا يُنذر بقدوم محرّك اقتصادي جديد يتبلور حالياً ليزعزع استقرار الاقتصادات القائمة، علِمنا به أم جهِلناه.\n    <\u002Fp>\n\n    <header class=\"opener\">\n      <div class=\"num-big\"><\u002Fdiv>\n      <h2>الشواهد : بحث ٢٠٢٢<\u002Fh2>\n      <p class=\"dek\">مراجعة لنحو ٣٠٠ ورقة و٦٠٠٠ نقطة بيانات: التكتل الحضري بدأ يفقد قوته بعد عام ٢٠١٠.<\u002Fp>\n    <\u002Fheader>\n    <p>استناداً إلى دراسة محكَّمة نُشرت عام ٢٠٢٢، قام خلالها الباحثون بمراجعة نحو ٣٠٠ ورقة علمية حول التكتل الاقتصادي الحضري — تضمّنت أكثر من ٦٠٠٠ نقطة بيانات من مدن مختلفة حول العالم لدراسة العلاقة بين التكتل الحضري ومعدلات الإنتاجية — وُجد أن الفترة من ١٩٦٠ حتى ٢٠١٠ شهدت تسجيل الاقتصادات الحضرية لمعدلات إنتاجية مرتفعة. إلا أنه بعد عام ٢٠١٠، تغيّر المشهد تماماً؛ إذ بدأت هذه الإنتاجية في التناقص،&nbsp; تضاعفت وتيرة هذا الانحدار نسبياً بعد عام ٢٠٢٠. هذا التراجع قد يعيد للأذهان الموجة الزراعية الأولى التي انخفضت إنتاجيتها مع قدوم الثورة الصناعية، ثم الموجة الثالثة (الحضرية) التي أدّت بدورها إلى تراجع الإنتاجية الصناعية. واليوم، تسجّل الاقتصادات الحضرية انخفاضاً بدأت ملامحه تتضح، مما يُنذر بتشكّل موجة رابعة من التحوّل الاقتصادي.<\u002Fp>\n\n  <\u002Farticle>\n<\u002Fmain>\n\n<main class=\"sheet\">\n  <span class=\"page-num\"><b>03<\u002Fb> / 04<\u002Fspan>\n  <article>\n\n    <header class=\"opener\">\n      <div class=\"num-big\"><\u002Fdiv>\n      <h2>صعود الوكلاء الرقميين كمحرّك جديد<\u002Fh2>\n      <p class=\"dek\">الذكاء الاصطناعي يُلغي الحاجة الملحّة للقرب المكاني — والطبقة المبدعة على المحك.<\u002Fp>\n    <\u002Fheader>\n    <p>ربما نقف اليوم على أعتاب تحوّل جذري قد يقلب المعادلة رأساً على عقب، متمثلاً في ثورة الذكاء الاصطناعي وأدواته، وعلى رأسها الوكلاء الرقميون (AI Agents). فإذا كان الاقتصاد الحضري قد استمدّ قيمته الجوهرية تاريخياً من منطق \"التكتل الجغرافي\" للبشر بهدف تبادل المعرفة والإنتاج، فإن الوكلاء الرقميين سيدفعوننا حتماً لإعادة النظر في هذه العلاقة التاريخية بين إنتاج المعرفة والقرب المكاني. فالوكلاء الرقميون لا يحتاجون إلى مساحات مكتبية في قلب المناطق المركزية لتسيير الأعمال أو الإنتاج. هذه الكيانات الافتراضية قادرة على تحليل البيانات، وتصميم النماذج، بل والتعاون فيما بينها تحت إشراف بشري لإنجاز أعقد المهام وبشكل فوري على مدار الساعة، مما يُلغي الحاجة الملحّة لتركّز العقول البشرية في بقعة جغرافية واحدة.<\u002Fp>\n    <p>وبناءً على ذلك، إذا افترضنا أن الشركات والمؤسسات ستعتمد بكثافة على هذه التقنيات في المرحلة المقبلة، فهذا يعني توجهاً نحو تقليص كبير في أعداد الكوادر البشرية بهدف تعظيم الأرباح وخفض التكاليف التشغيلية. وهذا التحوّل سيطال الطبقة المبدعة التي طالما كانت المحرّك الأساسي للاقتصادات الحضرية. فالمهام التي كانت حكراً عليهم — بدءاً من البرمجة والتحليل المالي والتصميم، وصولاً إلى أعقد عمليات البحث والتطوير — أصبحت اليوم في متناول الوكلاء الرقميين، الذين تتطور دقة مخرجاتهم وسرعة استجابتهم للتحديات بوتيرة تتجاوز قدرات العقل البشري.<\u002Fp>\n\n    <header class=\"opener\">\n      <div class=\"num-big\"><\u002Fdiv>\n      <h2>المآلات على واقعنا اليوم<\u002Fh2>\n      <p class=\"dek\">العقار المكتبي يتراجع، وأراضي مراكز البيانات تتصدّر هرم القيمة — لندن ١٩٠٠٠ ريال/م².<\u002Fp>\n    <\u002Fheader>\n    <p>\n      هذا الأمر سيكون له — بلا شك — مآلات عميقة على أسعار العقارات الحضرية بكافة أشكالها، وفي مقدمتها العقارات التجارية والمكتبية. ستتمكن الشركات من تحقيق إنتاجية هائلة دون تكبّد التكاليف الباهظة للتكتل المكاني داخل النطاقات الحضرية. في المقابل، يدرك صنّاع القرار ومسؤولو المشاريع حتمية هذا التغيير، مما سيدفعهم لرفع سقف التوقعات والإنتاجية المطلوبة من الشركات والأفراد. وفي خضمّ هذا التحوّل، ستبرز حاجة ماسّة إلى <span class=\"em\">خوادم سحابية<\u002Fspan> <span class=\"term-en\">(Cloud Servers)<\u002Fspan> أكثر قوة لاستيعاب سقف التوقعات الجديد. ولعل هذا يقودنا إلى استقراء مَكمن القيمة الجديدة المحرّكة للموجة الرابعة: <span class=\"em\">الخوادم السحابية ومراكز البيانات<\u002Fspan>.\n    <\u002Fp>\n    <p>ولو عدنا إلى الفرضية التي طُرحت في بداية المقال، والتي تنص على إمكانية رصد الاقتصاد المهيمن من خلال تتبع أسعار استخدامات الأراضي، فإننا سنسقط هذا التحليل على أسعار الأراضي المخصصة للخوادم السحابية، والتي تُعرف بـ \"مراكز البيانات\" (Data Centers). ولعل أقرب الأمثلة العالمية التي يمكن الاستدلال بها هي مدينة أمستردام في هولندا، التي تسعى لتكون \"بوابة البيانات الأوروبية\". ففي عام 2017، كان سعر المتر المربع للأراضي المخصصة لمراكز البيانات يتراوح بين 900 و1800 ريال. وبحلول عام 2023، قفز السعر لنفس الاستخدام ليصل إلى 7500 ريال. وفي مدينة فرانكفورت الألمانية، قد يصل متوسط سعر المتر المربع لأراضي مراكز البيانات إلى 6000 ريال، بينما نظيره الصناعي لا يتجاوز 1600 ريال. أما في لندن، فيصل سعر المتر المربع لمراكز البيانات إلى حوالي 19,000 ريال سعودي.<\u002Fp>\n    <p>\n      يُعزى هذا الارتفاع الكبير في أسعار الأراضي — والذي سيتضاعف بلا شك مستقبلاً في العديد من المدن حول العالم — إلى أن هذه المراكز تتطلب مزايا موقعية نسبية تتوافق مع طبيعة عملها. من ذلك، على سبيل المثال، الحاجة لبنية تحتية قوية للطاقة في الجوار تستوعب معدلات الاستهلاك الضخمة، والقدرة على تبريد الحرارة المنبعثة من الخوادم. ناهيك عن فكرة \"التكتل\" التي أعادت إنتاج نفسها في هذا النمط الاقتصادي الجديد؛ إذ تتطلب مراكز البيانات القرب الجغرافي من بعضها البعض لتعمل بكفاءة عالية في تبادل المعلومات وتحسين تجربة المستخدم. هذا التعقيد التقني والمكاني دفع بعض المدن لاتخاذ خطوات استباقية من خلال تحديث مخططات تقسيم الأراضي واستخداماتها <span class=\"term-en\">(Zoning)<\u002Fspan> لتستوعب \"مراكز البيانات\" كاستخدام أراضٍ مستقل، بضوابطه واشتراطاته المكانية، ومواقعه الجغرافية المحددة، وفئاته المتعددة.\n    <\u002Fp>\n\n  <\u002Farticle>\n<\u002Fmain>\n\n<main class=\"sheet\">\n  <span class=\"page-num\"><b>04<\u002Fb> / 04<\u002Fspan>\n  <article>\n\n    <header class=\"opener\">\n      <div class=\"num-big\"><\u002Fdiv>\n      <h2>قراءة في المدن العربية: الرياض في الصدارة<\u002Fh2>\n      <p class=\"dek\">تكتل جديد لمدن الذكاء الاصطناعي يتشكّل عالمياً — والرياض تقدّم نفسها قائدةً اقليمية.<\u002Fp>\n    <\u002Fheader>\n    <p>على ضوء هذه المعطيات المتغيّرة بوتيرة متسارعة، يمكن القول إن الموجة الرابعة القادمة لن تُحدث قطيعة تامة مع الاقتصاد الحضري، بل ستخلق فهماً جديداً للمتغيّرات التي يجب التعاطي معها لتعزيز الاقتصادات المحلية على مستوى المدن والأقاليم. تحديداً، منطق القيمة لأسعار الأراضي الحضرية قد يشهد دخول فاعلين جدد وعوامل جذب مستحدثة لاستقطاب السكان المبدعين — محلياً وعالمياً — مثل توفّر بنية تحتية رقمية ذكية ومتنوعة، ومصادر طاقة منخفضة التكلفة قادرة على جذب مستثمري مراكز البيانات من جميع أنحاء العالم. وبالتالي، فإن الأراضي الحضرية التي تتمتع بهذه المقوّمات الرقمية — الأراضي التي تدعم مضاعفة إنتاجية الفرد باستخدام الذكاء الاصطناعي — هي التي ستتربّع على قمة هرم القيم العقارية مستقبلاً.<\u002Fp>\n    <p>\n      ويمكن القول إن هذه الموجة الرابعة من التحوّل الاقتصادي — إن حدثت — تتجلى حالياً في ظاهرتَين: الأولى، أنها تسمح بتباعد جغرافي لم يكن ممكناً من قبل، وهذا يهدد منطق القيمة الحضرية القائم على القرب والتفاعل المباشر. والثانية، أن المواهب التقنية والاستثمارات في الذكاء الاصطناعي تتجمّع حالياً في تكتل محدود من المدن العالمية: <span class=\"em\">سان فرانسيسكو، نيويورك، سياتل، تورنتو، أمستردام<\u002Fspan>، ومؤخراً <span class=\"em\">الرياض<\u002Fspan>. ويبدو أن كثيراً من المدن العربية رصدت هذا التغيير، فنجد <span class=\"em\">مسقط، دبي، والدار البيضاء<\u002Fspan> قد دخلت بقوة في هذا المضمار. وأعتقد أن المدن التي ستقدّم تجربة ثقافية وترفيهية وجودة حياة مرتفعة — مدن مؤنسَنة — بالإضافة إلى استعدادها للموجة الرابعة من التغيير الاقتصادي القادم، ستكون هي المدن التي سترسم المستقبل الحضري. ويبدو أن الرياض ستكون هي القائدة في هذا المجال؛ فهي بذكاءٍ اليوم تحمل لواء الأنسنة عالمياً، وحالياً ترسم استراتيجية الاعتماد على البيانات كنفط المستقبل.\n    <\u002Fp>\n\n    <header class=\"opener\">\n      <div class=\"num-big\"><\u002Fdiv>\n      <h2>خاتمة<\u002Fh2>\n      <p class=\"dek\">أيّ إنتاج جديد، وأيّ أرض يحتاج؟ السؤال الذي يقرأ المستقبل.<\u002Fp>\n    <\u002Fheader>\n    <p>وأختم بأن فرضية \"قيمة الأرض تنساق خلف الاقتصاد المهيمن\" هي عدسة للقراءة الاستراتيجية للمستقبل. الذين قرأوا التحولات السابقة بنجاح كانوا يطرحون سؤالاً واحداً: ما هي طبيعة الإنتاج الجديد، وأيّ نوع من الأرض يحتاجها؟&nbsp;وحين نطرح هذا السؤال على مدننا اليوم، فإنّنا نمتلك قدرة استباقية على قراءة أيّ تحوّل جذري قد يُعيد رسم خرائط النشاط الاقتصادي، قبل أن يفرض نفسَه واقعاً علينا.<\u002Fp>\n\n  <\u002Farticle>\n\n  <section class=\"endmatter\">\n    <h3 class=\"ui\">References &amp; Notes<\u002Fh3>\n    <p class=\"ref\"><span class=\"n\">[١]<\u002Fspan> دراسة محكَّمة (٢٠٢٢) تستعرض ما يقارب ٣٠٠ ورقة علمية وأكثر من ٦٬٠٠٠ نقطة بيانات حول العلاقة بين التكتل الاقتصادي الحضري والإنتاجية في مدن متعددة حول العالم.<\u002Fp>\n    <p class=\"ref\"><span class=\"n\">[٢]<\u002Fspan> Piketty, T. (2014) — على بيانات نسبة قيمة الأراضي الزراعية إلى الناتج الوطني في أوروبا خلال القرنين السابع عشر والثامن عشر.<\u002Fp>\n    <p class=\"ref\"><span class=\"n\">[٣]<\u002Fspan> Florida, R. — مفهوم \"الطبقة المبدعة\" <span class=\"term-en\">(Creative Class)<\u002Fspan> وأثره على الاقتصاد الحضري.<\u002Fp>\n    <p class=\"ref\"><span class=\"n\">[٤]<\u002Fspan> بيانات أسعار الأراضي المخصصة لمراكز البيانات في أمستردام وفرانكفورت ولندن — مصادر مفتوحة من تقارير سوق العقارات الأوروبية ٢٠١٧–٢٠٢٣.<\u002Fp>\n    <p class=\"ref\"><span class=\"n\">[٥]<\u002Fspan> Glaeser, E. — أعمال حول اقتصاديات التكتّل ومستقبل المدن في عصر العمل عن بُعد والذكاء الاصطناعي.<\u002Fp>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n\n\n<\u002Fbody><\u002Fhtml>"
